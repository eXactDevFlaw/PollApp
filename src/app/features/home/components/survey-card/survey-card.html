<div class="survey-card">
  <span class="survey-card__category">{{ survey().category }}</span>
  <h3>{{ survey().name }}</h3>
  <div class="survey-card__footer">
    <span class="survey-card__status">{{ survey().status }}</span>
    <span class="survey-card__badge">{{ getDaysLabel(survey().end_date) }}</span>
  </div>
</div>
